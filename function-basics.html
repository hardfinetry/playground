<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Function Basics</title>
</head>
<body>
    <script>
        function add7 (number) {
            return number + 7;
        }
        function multiply (no1, no2) {
            return no1 * no2;
        }
        function capitalize (string) {
            return string.toUpperCase(string.slice(0,1)) + string.toLowerCase(string.slice(1))

        }
        function lastLetter (string) {
            return string.slice(-1)
        }

    </script>

</body>
</html>
